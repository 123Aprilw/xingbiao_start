<!DOCTYPE html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<title>1.At The Lake - 学习页面</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
				background-color: #f5f5f5;
				min-height: 100vh;
				/* 适配手机安全区域 */
				padding-bottom: env(safe-area-inset-bottom);
			}

			.back_left {
				width: 20px;
				height: 20px;

			}

			.back_left img {
				width: 100%;
				height: 100%;
			}

			/* 顶部导航栏 */
			.header {
				background-color: #ffd333;
				color: #000;
				padding: 16px 16px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				position: relative;
				/* 适配顶部安全区域 */
				padding-top: calc(44px + env(safe-area-inset-top));
			}

			.header-back {
				font-size: 20px;
				color: #000;
				text-decoration: none;
			}

			.header-title {
				font-size: 18px;
				font-weight: 600;
			}

			/* 主内容容器 */
			.container {
				padding: 16px;
				max-width: 750px;
				margin: 0 auto;
			}

			/* 顶部插画区域 */
			.banner {
				width: 100%;
				border-radius: 8px;
				overflow: hidden;
				margin-bottom: 12px;
			}

			.banner img {
				width: 100%;
				display: block;
				/* 这里用背景色占位，实际项目替换为你的插画图片 */
				background-color: #fff;
				aspect-ratio: 16/9;
				object-fit: cover;
			}

			/* 等级&收藏行 */
			.info-row {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 20px;
				padding: 0 4px;
			}

			.info-left {
				font-size: 15px;
				color: #333;
			}

			.info-right {
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 15px;
				color: #333;
			}

			.star-icon {
				color: #ffd333;
				font-size: 18px;
			}

			/* 模块标题 */
			.section-title {
				font-size: 17px;
				font-weight: 600;
				color: #333;
				margin-bottom: 12px;
				padding-left: 4px;
			}

			/* 功能模块卡片 */
			.module-card {
				background-color: #fff;
				border-radius: 12px;
				padding: 16px 0;
				margin-bottom: 16px;
				box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
			}

			.module-item {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 12px 16px;
				cursor: pointer;
				transition: background-color 0.2s;
			}

			.module-item:hover {
				background-color: #fafafa;
			}

			.module-item:not(:last-child) {
				border-bottom: 1px solid #f5f5f5;
			}

			.module-left {
				display: flex;
				align-items: center;
				gap: 12px;
			}

			.module-icon {
				width: 40px;
				height: 40px;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				color: #fff;
				font-size: 18px;
			}

			.module-name {
				font-size: 16px;
				color: #333;
			}

			.module-right {
				font-size: 15px;
			}

			.go-learn {
				color: #666;
			}

			.completed {
				background-color: #ffd333;
				color: #000;
				padding: 4px 12px;
				border-radius: 12px;
				font-weight: 500;
			}

			/* 底部Quiz模块 */
			.quiz-item {
				background-color: #fff;
				border-radius: 12px;
				padding: 16px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				box-shadow: 0 1px 6px rgba(0, 0, 0, 0.05);
			}

			.star {
				display: flex;
				align-items: center;
				justify-content: center;
				width: 20px;
				height: 20px;
			}

			.star img {
				width: 100%;
				height: 100%;
			}

			/* 图标颜色 */
			.icon-orange {
				background-color: #ff9533;
			}

			.icon-red {
				background-color: #ff6b6b;
			}

			.icon-purple {
				background-color: #9388ff;
			}

			.icon-green {
				background-color: #86e051;
			}
		</style>
	</head>
	<body>
		<!-- 顶部导航 -->
		<div class="header">
			<div class="back_left">
				<img src="../../static/left.png" alt="" />
			</div>
			<div class="header-title">1.At The Lake</div>
			<div></div>
		</div>

		<div class="container">
			<!-- 顶部插画 -->
			<div class="banner">
				<!-- 实际项目替换为你的插画图片地址 -->
				<img src="../../static/666.png" alt="At The Lake 插画">
			</div>

			<!-- 等级&收藏 -->
			<div class="info-row">
				<div class="info-left">等级：aa</div>
				<div class="info-right">
					<span>收藏：</span>
					<div class="star" onclick="collect()">
						<img src="../../static/start.png" alt="" id="Img" />
					</div>
				</div>
			</div>

			<!-- 基础学习模块 -->
			<div class="section-title">基础学习</div>
			<div class="module-card">
				<div class="module-item">
					<div class="module-left">
						<div class="module-icon icon-orange">🎧</div>
						<div class="module-name">Listen/听</div>
					</div>
					<div class="module-right go-learn">去学习</div>
				</div>
				<div class="module-item">
					<div class="module-left">
						<div class="module-icon icon-red">AB</div>
						<div class="module-name">Word/单词</div>
					</div>
					<div class="module-right completed">✓ 已完成</div>
				</div>
				<div class="module-item">
					<div class="module-left">
						<div class="module-icon icon-purple">🎤</div>
						<div class="module-name">Read/读</div>
					</div>
					<div class="module-right go-learn">去学习</div>
				</div>
			</div>

			<!-- 巩固练习模块 -->
			<div class="section-title">巩固练习</div>
			<div class="module-card">
				<div class="module-item">
					<div class="module-left">
						<div class="module-icon icon-orange">AB</div>
						<div class="module-name">Word/看词</div>
					</div>
					<div class="module-right go-learn">去学习</div>
				</div>
				<div class="module-item">
					<div class="module-left">
						<div class="module-icon icon-red">🖼️</div>
						<div class="module-name">Picture/看图</div>
					</div>
					<div class="module-right go-learn">去学习</div>
				</div>
				<div class="module-item">
					<div class="module-left">
						<div class="module-icon icon-green">📝</div>
						<div class="module-name">Translate/看词翻译</div>
					</div>
					<div class="module-right go-learn">去学习</div>
				</div>
				<div class="module-item">
					<div class="module-left">
						<div class="module-icon icon-purple">📄</div>
						<div class="module-name">Match/中英文匹配</div>
					</div>
					<div class="module-right go-learn">去学习</div>
				</div>
			</div>

			<!-- Quiz模块 -->
			<div class="quiz-item">
				<div class="module-left">
					<div class="module-icon icon-orange">📜</div>
					<div class="module-name">Quiz/测验</div>
				</div>
				<div class="module-right go-learn">去学习</div>
			</div>
		</div>
	</body>
</html>
<script>
	//收藏点击事件
	function collect() {
		let img1 = "../../static/start.png"
		let img2 = "../../static/shoucang.png"
		let StartImg = document.getElementById('Img')
		if (StartImg.src.includes("start.png")) {
			StartImg.src = img2
		} else {
			StartImg.src = img1
		}
	}
</script>
