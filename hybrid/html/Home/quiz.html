<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>测验 - 英语学习</title>
  <link rel="stylesheet" href="../static/style.css" />
  <style>
    .quiz-container {
      padding: 16px;
      max-width: 750px;
      margin: 0 auto;
    }
    
    .quiz-intro {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      margin-bottom: 24px;
    }
    
    .intro-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
    }
    
    .intro-title {
      font-size: 24px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
    }
    
    .intro-text {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 24px;
    }
    
    .intro-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 24px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }
    
    .stat-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .start-btn {
      background-color: #ffd333;
      color: #000;
      border: none;
      border-radius: 24px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .start-btn:hover {
      opacity: 0.9;
    }
    
    .question-card {
      background-color: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      margin-bottom: 24px;
    }
    
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .question-number {
      font-size: 16px;
      color: #666;
    }
    
    .question-type {
      font-size: 14px;
      color: #ff9533;
      background-color: #fff8e6;
      padding: 4px 12px;
      border-radius: 12px;
    }
    
    .question-text {
      font-size: 24px;
      font-weight: 600;
      color: #333;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .option-item {
      display: flex;
      align-items: center;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .option-item:hover {
      border-color: #ffd333;
      background-color: #fff8e6;
    }
    
    .option-item.selected {
      border-color: #ffd333;
      background-color: #fff8e6;
    }
    
    .option-item.correct {
      border-color: #86e051;
      background-color: #e8f5e9;
    }
    
    .option-item.wrong {
      border-color: #ff6b6b;
      background-color: #ffebee;
    }
    
    .option-letter {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #666;
      margin-right: 12px;
    }
    
    .option-item.selected .option-letter {
      background-color: #ffd333;
      color: #000;
    }
    
    .option-text {
      font-size: 18px;
      color: #333;
    }
    
    .answer-input {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }
    
    .answer-input:focus {
      border-color: #ffd333;
    }
    
    .action-buttons {
      display: flex;
      gap: 16px;
      margin-top: 24px;
    }
    
    .action-btn {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .action-btn:hover {
      opacity: 0.9;
    }
    
    .action-btn-secondary {
      background-color: #f5f5f5;
      color: #666;
    }
    
    .action-btn-primary {
      background-color: #ffd333;
      color: #000;
    }
    
    .result-card {
      background-color: #fff;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    
    .result-score {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffd333 0%, #ff9533 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    
    .score-number {
      font-size: 48px;
      font-weight: 700;
      color: #fff;
    }
    
    .result-title {
      font-size: 24px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }
    
    .result-stats {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin: 24px 0;
    }
    
    .result-stat {
      text-align: center;
    }
    
    .result-stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #ff9533;
    }
    
    .result-stat-label {
      font-size: 14px;
      color: #999;
    }
    
    .result-message {
      font-size: 16px;
      color: #666;
      margin-bottom: 24px;
    }
    
    .timer-bar {
      height: 4px;
      background-color: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    
    .timer-fill {
      height: 100%;
      background-color: #ffd333;
      border-radius: 2px;
      transition: width 1s linear;
    }
    
    #quizContent {
      display: none;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="header">
      <div class="header-back" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </div>
      <div class="header-title">测验</div>
      <div class="header-right"></div>
    </div>
    
    <div class="quiz-container">
      <div id="introContent">
        <div class="quiz-intro">
          <div class="intro-icon">📜</div>
          <div class="intro-title">测验挑战</div>
          <div class="intro-text">测试你的英语水平，看看你掌握了多少知识</div>
          <div class="intro-stats">
            <div class="stat-item">
              <div class="stat-number">10</div>
              <div class="stat-label">题目数</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">5</div>
              <div class="stat-label">分钟</div>
            </div>
            <div class="stat-item">
              <div class="stat-number">100</div>
              <div class="stat-label">满分</div>
            </div>
          </div>
          <button class="start-btn" onclick="startQuiz()">开始测验</button>
        </div>
      </div>
      
      <div id="quizContent">
        <div class="timer-bar">
          <div class="timer-fill" id="timerFill"></div>
        </div>
        
        <div class="question-card" id="questionCard">
          <div class="question-header">
            <span class="question-number" id="questionNumber">第 1 题</span>
            <span class="question-type" id="questionType">选择题</span>
          </div>
          <div class="question-text" id="questionText">What is the meaning of "lake"?</div>
          
          <div class="options-list" id="optionsList">
            <div class="option-item" onclick="selectOption(0)">
              <div class="option-letter">A</div>
              <div class="option-text">鱼</div>
            </div>
            <div class="option-item" onclick="selectOption(1)">
              <div class="option-letter">B</div>
              <div class="option-text">湖</div>
            </div>
            <div class="option-item" onclick="selectOption(2)">
              <div class="option-letter">C</div>
              <div class="option-text">船</div>
            </div>
            <div class="option-item" onclick="selectOption(3)">
              <div class="option-letter">D</div>
              <div class="option-text">树</div>
            </div>
          </div>
          
          <div class="action-buttons">
            <button class="action-btn action-btn-secondary" onclick="goBack()">退出</button>
            <button class="action-btn action-btn-primary" onclick="submitAnswer()">提交答案</button>
          </div>
        </div>
      </div>
      
      <div id="resultContent" style="display: none;">
        <div class="result-card">
          <div class="result-score">
            <div class="score-number" id="finalScore">0</div>
          </div>
          <div class="result-title" id="resultTitle">测验完成</div>
          <div class="result-message" id="resultMessage">继续加油！</div>
          <div class="result-stats">
            <div class="result-stat">
              <div class="result-stat-value" id="correctCount">0</div>
              <div class="result-stat-label">正确</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-value" id="wrongCount">0</div>
              <div class="result-stat-label">错误</div>
            </div>
            <div class="result-stat">
              <div class="result-stat-value" id="timeUsed">0</div>
              <div class="result-stat-label">用时(s)</div>
            </div>
          </div>
          <div class="action-buttons">
            <button class="action-btn action-btn-secondary" onclick="goBack()">返回</button>
            <button class="action-btn action-btn-primary" onclick="restartQuiz()">再测一次</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const questions = [
      {
        type: 'choice',
        question: 'What is the meaning of "lake"?',
        options: ['鱼', '湖', '船', '树'],
        answer: 1
      },
      {
        type: 'choice',
        question: 'What animal can swim in the lake?',
        options: ['bird', 'fish', 'cat', 'dog'],
        answer: 1
      },
      {
        type: 'choice',
        question: 'Which word means "船"?',
        options: ['tree', 'boat', 'sun', 'sky'],
        answer: 1
      },
      {
        type: 'choice',
        question: 'What do we see in the sky?',
        options: ['fish', 'boat', 'sun', 'lake'],
        answer: 2
      },
      {
        type: 'choice',
        question: 'What grows beside the lake?',
        options: ['fish', 'tree', 'boat', 'water'],
        answer: 1
      },
      {
        type: 'choice',
        question: 'Which word means "水"?',
        options: ['water', 'sky', 'bird', 'flower'],
        answer: 0
      },
      {
        type: 'choice',
        question: 'What flies in the sky?',
        options: ['fish', 'duck', 'bird', 'tree'],
        answer: 2
      },
      {
        type: 'choice',
        question: 'What color is the sun?',
        options: ['blue', 'red', 'yellow', 'green'],
        answer: 2
      },
      {
        type: 'choice',
        question: 'What do we use to cross the lake?',
        options: ['tree', 'boat', 'fish', 'flower'],
        answer: 1
      },
      {
        type: 'choice',
        question: 'What blooms in spring?',
        options: ['stone', 'flower', 'water', 'sky'],
        answer: 1
      }
    ];
    
    let currentQuestion = 0;
    let score = 0;
    let timeLeft = 300;
    let timerInterval;
    let selectedOption = -1;
    let startTime;
    
    function startQuiz() {
      document.getElementById('introContent').style.display = 'none';
      document.getElementById('quizContent').style.display = 'block';
      startTime = Date.now();
      loadQuestion();
      startTimer();
    }
    
    function loadQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1} 题`;
      document.getElementById('questionType').textContent = q.type === 'choice' ? '选择题' : '填空题';
      document.getElementById('questionText').textContent = q.question;
      
      const options = document.querySelectorAll('.option-item');
      options.forEach((opt, i) => {
        opt.classList.remove('selected', 'correct', 'wrong');
        opt.querySelector('.option-text').textContent = q.options[i];
      });
      
      selectedOption = -1;
    }
    
    function selectOption(index) {
      const options = document.querySelectorAll('.option-item');
      options.forEach((opt, i) => {
        opt.classList.toggle('selected', i === index);
      });
      selectedOption = index;
    }
    
    function submitAnswer() {
      if (selectedOption === -1) {
        alert('请选择一个答案');
        return;
      }
      
      const q = questions[currentQuestion];
      const options = document.querySelectorAll('.option-item');
      
      options.forEach((opt, i) => {
        if (i === q.answer) {
          opt.classList.add('correct');
        } else if (i === selectedOption && i !== q.answer) {
          opt.classList.add('wrong');
        }
        opt.style.pointerEvents = 'none';
      });
      
      if (selectedOption === q.answer) {
        score++;
      }
      
      setTimeout(() => {
        nextQuestion();
      }, 1000);
    }
    
    function nextQuestion() {
      currentQuestion++;
      
      if (currentQuestion >= questions.length) {
        showResult();
        return;
      }
      
      loadQuestion();
    }
    
    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const progress = (timeLeft / 300) * 100;
        document.getElementById('timerFill').style.width = `${progress}%`;
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          showResult();
        }
      }, 1000);
    }
    
    function showResult() {
      clearInterval(timerInterval);
      document.getElementById('quizContent').style.display = 'none';
      document.getElementById('resultContent').style.display = 'block';
      
      const finalScore = Math.round((score / questions.length) * 100);
      const timeUsed = Math.round((Date.now() - startTime) / 1000);
      
      document.getElementById('finalScore').textContent = finalScore;
      document.getElementById('correctCount').textContent = score;
      document.getElementById('wrongCount').textContent = questions.length - score;
      document.getElementById('timeUsed').textContent = timeUsed;
      
      if (finalScore >= 90) {
        document.getElementById('resultTitle').textContent = '太棒了！';
        document.getElementById('resultMessage').textContent = '你是英语小天才！';
      } else if (finalScore >= 70) {
        document.getElementById('resultTitle').textContent = '做得很好！';
        document.getElementById('resultMessage').textContent = '继续保持！';
      } else if (finalScore >= 60) {
        document.getElementById('resultTitle').textContent = '及格了！';
        document.getElementById('resultMessage').textContent = '还需要多加练习哦！';
      } else {
        document.getElementById('resultTitle').textContent = '继续加油！';
        document.getElementById('resultMessage').textContent = '多复习几次会更好！';
      }
    }
    
    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      timeLeft = 300;
      document.getElementById('timerFill').style.width = '100%';
      document.getElementById('resultContent').style.display = 'none';
      document.getElementById('quizContent').style.display = 'block';
      startTime = Date.now();
      loadQuestion();
      startTimer();
    }
    
    function goBack() {
      window.location.href = 'Home.html';
    }
  </script>
</body>
</html>
